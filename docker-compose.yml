version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bluesend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bluesend
      POSTGRES_USER: bluesend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluesend_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/internal/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluesend -d bluesend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bluesend_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-bluesend_dev} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-bluesend_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: bluesend_api
    restart: unless-stopped
    environment:
      - ENV=development
      - DATABASE_URL=postgres://bluesend:${POSTGRES_PASSWORD:-bluesend_dev}@postgres:5432/bluesend?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD:-bluesend_dev}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_SETUP=${STRIPE_PRICE_SETUP}
      - STRIPE_PRICE_MONTHLY=${STRIPE_PRICE_MONTHLY}
      - STRIPE_PRICE_ANNUAL=${STRIPE_PRICE_ANNUAL}
      - GHL_CLIENT_ID=${GHL_CLIENT_ID}
      - GHL_CLIENT_SECRET=${GHL_CLIENT_SECRET}
      - GHL_WEBHOOK_SECRET=${GHL_WEBHOOK_SECRET}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - API_URL=${API_URL:-http://localhost:8080}
      - DEVICE_WS_URL=${DEVICE_WS_URL:-ws://localhost:8081}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev_admin_key_change_in_production}
      - PORT=8080
      - WS_PORT=8081
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: bluesend_web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080}
      - NEXT_PUBLIC_WS_URL=${WS_URL:-ws://localhost:8081}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev_nextauth_secret}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
