upstream api {
    server api:8080;
    keepalive 32;
}

upstream ws {
    server api:8081;
    keepalive 16;
}

upstream web {
    server web:3000;
    keepalive 16;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name app.blutexts.com api.blutexts.com devices.blutexts.com;
    return 301 https://$host$request_uri;
}

# Main app
server {
    listen 443 ssl http2;
    server_name app.blutexts.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API
server {
    listen 443 ssl http2;
    server_name api.blutexts.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Stripe webhook — no rate limit
    location /api/webhooks/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # WebSocket upgrade for dashboard clients
    location /api/ws {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# Device WebSocket endpoint (device agents connect here)
server {
    listen 443 ssl http2;
    server_name devices.blutexts.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/devices/connect {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # 24h — devices hold persistent connections
        proxy_send_timeout 86400s;
    }
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
